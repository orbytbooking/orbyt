<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 72 72" role="img" aria-hidden="true">
  <defs>
    <linearGradient id="hb-outer" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7dd3fc"/>
      <stop offset="100%" stop-color="#0284c7"/>
    </linearGradient>
    <linearGradient id="hb-tub" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
  </defs>
  <circle cx="36" cy="36" r="34" fill="url(#hb-outer)"/>
  <rect x="14" y="16" width="44" height="44" rx="10" fill="#fff" opacity="0.98"/>
  <rect x="14" y="16" width="44" height="44" rx="10" fill="none" stroke="#bae6fd" stroke-width="1.2" opacity="0.95"/>
  <!-- Clawfoot tub + riser shower + droplets + H/C taps (reference style) -->
  <g stroke-linecap="round" stroke-linejoin="round">
    <!-- Shower pipe -->
    <path fill="none" stroke="#94a3b8" stroke-width="2" d="M44 24v18"/>
    <path fill="#cbd5e1" stroke="#64748b" stroke-width="1.2"
      d="M40 22h10l-1.2 3.5h-7.6L40 22z"/>
    <!-- Water droplets -->
    <circle cx="34" cy="28" r="2" fill="#38bdf8" opacity="0.9"/>
    <circle cx="31" cy="32" r="1.5" fill="#7dd3fc" opacity="0.85"/>
    <circle cx="37" cy="31" r="1.4" fill="#0ea5e9" opacity="0.8"/>
    <circle cx="33" cy="35" r="1.2" fill="#38bdf8" opacity="0.75"/>
    <!-- Tub body -->
    <path fill="url(#hb-tub)" stroke="#64748b" stroke-width="1.8"
      d="M20 42c0-8 6-14 16-14s16 6 16 14v2H20v-2z"/>
    <path fill="none" stroke="#94a3b8" stroke-width="1.3"
      d="M22 42c1.5-6.5 7-11 14-11s12.5 4.5 14 11"/>
    <!-- Claw feet -->
    <path fill="none" stroke="#475569" stroke-width="1.4" d="M24 44v3c0 1-1 2-2 2M40 44v3c0 1 1 2 2 2"/>
    <!-- Hot / cold knobs on rim -->
    <circle cx="28" cy="40" r="2.2" fill="#ef4444" stroke="#b91c1c" stroke-width="0.9"/>
    <circle cx="36" cy="40" r="2.2" fill="#3b82f6" stroke="#1d4ed8" stroke-width="0.9"/>
    <!-- Water in tub -->
    <ellipse cx="36" cy="43" rx="11" ry="2" fill="#bae6fd" opacity="0.55"/>
  </g>
</svg>
